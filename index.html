<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freight Services | Carrier Snapshot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  :root {
    --navy: #1a4a7c;
    --navy-dark: #0f2d4e;
    --gold: #f8c750;
    --gold-dark: #e0a800;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1a2332;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #16a34a;
    --red: #dc2626;
    --orange: #d97706;
    --shadow: 0 4px 24px rgba(26,74,124,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px; }
  .container { max-width: 1000px; margin: 0 auto; }

  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .header-icon { width: 44px; height: 44px; background: var(--navy); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .header-icon svg { width: 26px; height: 26px; fill: var(--gold); }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); padding: 28px; margin-bottom: 20px; }

  .search-row { display: flex; }
  input[type="text"] { flex: 1; padding: 13px 16px; border: 2px solid var(--border); border-right: none; border-radius: 8px 0 0 8px; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; outline: none; transition: border-color 0.2s; color: var(--text); }
  input[type="text"]:focus { border-color: var(--navy); }
  .btn-search { padding: 13px 28px; background: var(--navy); color: white; border: none; border-radius: 0 8px 8px 0; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.2s; }
  .btn-search:hover { background: var(--navy-dark); }

  .loading { display: none; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; margin-top: 16px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--border); }
  td { padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: var(--green); }
  .badge-red { background: #fee2e2; color: var(--red); }
  .badge-orange { background: #fef3c7; color: var(--orange); }
  .badge-gray { background: #f1f5f9; color: var(--muted); }

  .btn-select { background: var(--gold); color: var(--navy-dark); border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.15s; }
  .btn-select:hover { background: var(--gold-dark); }

  .alert-banner { border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .alert-danger { background: #fee2e2; color: var(--red); border: 1px solid #fca5a5; }
  .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

  .back-btn { background: none; border: none; color: var(--navy); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 16px; padding: 0; font-family: 'IBM Plex Sans', sans-serif; }
  .back-btn:hover { color: var(--navy-dark); }

  .snap-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
  .snap-name { font-size: 22px; font-weight: 700; color: var(--navy); }
  .snap-meta { font-size: 13px; color: var(--muted); margin-top: 5px; font-family: 'IBM Plex Mono', monospace; }

  .section { margin-bottom: 28px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .stat-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--navy); }
  .stat-val.sm { font-size: 14px; font-weight: 600; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.orange { color: var(--orange); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .oos-bar-wrap { margin-top: 6px; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .oos-bar { height: 6px; border-radius: 4px; }
  .oos-bar.safe { background: var(--green); }
  .oos-bar.warn { background: var(--orange); }
  .oos-bar.danger { background: var(--red); }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: #e0eaf5; color: var(--navy); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 500; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { background: #f8fafc; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }

  @media (max-width: 640px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-.5 1.5 1.96 2.5H17V9.5h2.5zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2.22-3c-.55-.61-1.33-1-2.22-1s-1.67.39-2.22 1H3V6h12v9H8.22zm9.78 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
    </div>
    <div>
      <h1>Carrier Snapshot Search</h1>
      <p>Search by DOT#, MC#, or Company Name</p>
    </div>
  </div>

  <div class="card">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="e.g. 1677170 or MID VALLEY TRANSPORT" onkeydown="if(event.key==='Enter') searchCarriers()">
      <button class="btn-search" onclick="searchCarriers()">Search</button>
    </div>
    <div class="loading" id="loadingMsg">
      <div class="spinner"></div>
      <span id="loadingText">Searching FMCSA databases...</span>
    </div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <table>
      <thead><tr>
        <th>Legal Name</th><th>DOT Number</th><th>MC/Docket</th><th>Status</th><th>Location</th><th>Action</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="snapshotSection" style="display:none;">
    <button class="back-btn" onclick="goBack()">← Back to Results</button>
    <div id="alertBanners"></div>
    <div class="card">
      <div id="snapshotLoading" style="text-align:center;padding:48px;color:var(--muted);">
        <div class="spinner" style="margin:0 auto 14px;width:28px;height:28px;border-width:3px;"></div>
        <p id="loadingStage" style="font-size:14px;">Fetching carrier data...</p>
      </div>
      <div id="snapshotContent" style="display:none;"></div>
    </div>
  </div>

</div>
<script>
const N8N_SEARCH      = "https://n8n.turbofreightllc.com/webhook/carrier-search";
const FMCSA_KEY       = "765f2002350d7989b1fef32b3522639c55fc27a8";
const FMCSA_BASE      = "https://mobile.fmcsa.dot.gov/qc/services/carriers";
const SOCRATA_CARRIER = "https://data.transportation.gov/resource/az4n-8mr2.json"; // MCS-150 Carrier data
const OPENCORP_SEARCH = "https://api.opencorporates.com/v0.4/companies/search";
const OPENCORP_BASE   = "https://api.opencorporates.com/v0.4/companies";

function fmcsa(path) {
  return fetch(`${FMCSA_BASE}${path}?webKey=${FMCSA_KEY}`)
    .then(r => r.ok ? r.json() : null).catch(() => null);
}
function socrata(url, params) {
  return fetch(`${url}?${new URLSearchParams(params)}`)
    .then(r => r.ok ? r.json() : []).catch(() => []);
}
function getCarrierData(dotNumber) {
  return socrata(SOCRATA_CARRIER, { dot_number: dotNumber, '$limit': 1 })
    .then(data => Array.isArray(data) && data.length > 0 ? data[0] : null);
}
function fmt(v, fallback) { return (v !== null && v !== undefined && v !== '') ? v : (fallback !== undefined ? fallback : '—'); }
function formatMoney(value, suffix = '') {
  const n = parseFloat(value);
  if (Number.isFinite(n)) return '$' + n.toLocaleString() + suffix;
  return '—';
}
function pct(v) { return v != null ? v.toFixed(1) + '%' : '—'; }
function oosColor(rate, avg) {
  if (rate == null) return 'safe';
  if (rate > avg * 1.5) return 'danger';
  if (rate > avg) return 'warn';
  return 'safe';
}
function authLabel(code) { return {A:'Active',I:'Inactive',N:'None'}[code] || code || '—'; }
function badgeClass(code) { return code==='A' ? 'badge-green' : code==='I' ? 'badge-red' : 'badge-gray'; }
function dateStr(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e) { return s; }
}

function calculateDuration(grantedDate) {
  if (!grantedDate) return '—';
  try {
    const granted = new Date(grantedDate);
    const now = new Date();
    const years = now.getFullYear() - granted.getFullYear();
    const months = now.getMonth() - granted.getMonth();
    if (months < 0) return `${years - 1}y ${12 + months}m`;
    return `${years}y ${months}m`;
  } catch(e) { return '—'; }
}

function normalizeString(value) {
  return (value || '').toString().trim().replace(/\s+/g, ' ').replace(/[^a-z0-9 ]/gi, '').toLowerCase();
}

async function openCorporatesSearch(name, state) {
  if (!name) return null;
  const params = new URLSearchParams({ q: name, per_page: 5 });
  if (state) params.set('jurisdiction_code', `us_${state.toLowerCase()}`);
  const url = `${OPENCORP_SEARCH}?${params}`;
  const data = await fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  const companies = data?.results?.companies || [];
  if (!companies.length) return null;
  const normalizedName = normalizeString(name);
  const exactMatch = companies.find(item => normalizeString(item.company.name) === normalizedName);
  return exactMatch ? exactMatch.company : companies[0].company;
}

async function openCorporatesCompany(company) {
  if (!company?.jurisdiction_code || !company?.company_number) return null;
  const url = `${OPENCORP_BASE}/${company.jurisdiction_code}/${company.company_number}`;
  const data = await fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  return data?.results?.company || null;
}

async function searchCarriers() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return alert("Please enter a search term.");
  document.getElementById("resultsCard").style.display = "none";
  document.getElementById("snapshotSection").style.display = "none";
  setLoading(true, "Searching FMCSA databases...");
  try {
    const r = await fetch(`${N8N_SEARCH}?q=${encodeURIComponent(query)}`);
    if (!r.ok) throw new Error();
    const data = await r.json();
    setLoading(false);
    if (!data || data.length === 0) return alert("No carriers found.");
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    data.forEach(c => {
      const active = c.status_code === 'A';
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${fmt(c.legal_name)}</strong></td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${fmt(c.dot_number)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${fmt(c.docket1)}</td>
        <td><span class="badge ${active?'badge-green':'badge-red'}">${active?'Active':'Inactive'}</span></td>
        <td>${[c.phy_city,c.phy_state].filter(Boolean).join(', ')||'—'}</td>
        <td><button class="btn-select" onclick="loadSnapshot('${c.dot_number}','${(c.legal_name||'').replace(/'/g,"\\'")}')">Select</button></td>`;
      tbody.appendChild(tr);
    });
    document.getElementById("resultsCard").style.display = "block";
  } catch(e) {
    setLoading(false);
    alert("Error searching. Check your n8n search webhook.");
  }
}

function setLoading(show, text) {
  document.getElementById("loadingMsg").style.display = show ? "flex" : "none";
  if (text) document.getElementById("loadingText").textContent = text;
}

function goBack() {
  document.getElementById("snapshotSection").style.display = "none";
  document.getElementById("resultsCard").style.display = "block";
}

async function loadSnapshot(dot, name) {
  document.getElementById("resultsCard").style.display = "none";
  document.getElementById("snapshotSection").style.display = "block";
  document.getElementById("snapshotLoading").style.display = "block";
  document.getElementById("snapshotContent").style.display = "none";
  document.getElementById("alertBanners").innerHTML = "";
  document.getElementById("loadingStage").textContent = "Fetching carrier data...";

  const [mainData, basicsData, cargoData, opsData, docketData, authorityData, oosData, carrierData] = await Promise.all([
    fmcsa(`/${dot}`),
    fmcsa(`/${dot}/basics`),
    fmcsa(`/${dot}/cargo-carried`),
    fmcsa(`/${dot}/operation-classification`),
    fmcsa(`/${dot}/docket-numbers`),
    fmcsa(`/${dot}/authority`),
    fmcsa(`/${dot}/oos`),
    getCarrierData(dot)
  ]);

  if (!mainData || !mainData.content) {
    document.getElementById("snapshotLoading").style.display = "none";
    document.getElementById("snapshotContent").innerHTML = `<div style="text-align:center;padding:40px;"><p style="color:var(--red);font-size:16px;font-weight:700;">Could not load carrier data</p><p style="margin-top:8px;color:var(--muted);">FMCSA returned an error for DOT# ${dot}.</p></div>`;
    document.getElementById("snapshotContent").style.display = "block";
    return;
  }

  const c          = mainData.content.carrier;
  let ownerInfo    = null;
  let corpInfo     = null;
  
  // Extract owner info from Socrata carrier data (priority)
  if (carrierData) {
    ownerInfo = {
      ownerName: carrierData.company_officer_1 || null,
      phone: carrierData.phone || null,
      email: carrierData.email_address || null,
      powerUnits: parseInt(carrierData.power_units) || 0,
      ownTrailers: parseInt(carrierData.owntrail) || 0,
      totalDrivers: parseInt(carrierData.total_drivers) || 0
    };
  }

  // Fallback to OpenCorporates if needed
  try {
    const companyCandidate = await openCorporatesSearch(name || c.legalName || c.dbaName, c.phyState);
    const corpData = companyCandidate ? await openCorporatesCompany(companyCandidate) : null;
    const officer = Array.isArray(corpData?.officers) ? corpData.officers[0] : null;
    corpInfo = {
      companyName: corpData?.name || companyCandidate?.name,
      jurisdiction: corpData?.jurisdiction_code || companyCandidate?.jurisdiction_code,
      status: corpData?.current_status || corpData?.current_status_description,
      address: corpData?.registered_address || corpData?.registered_office_address || '',
      incorporationDate: corpData?.incorporation_date
    };
  } catch (err) {
    corpInfo = null;
  }
  
  const basics     = basicsData?.content?.basics || [];
  const cargo      = cargoData?.content?.cargoCarried || [];
  const ops        = opsData?.content?.operationClassification || [];
  const dockets    = docketData?.content?.docketNumbers || [];
  const authority  = authorityData?.content?.authority || [];
  const oos        = oosData?.content?.oos || [];

  // ── Alert banners ──────────────────────────────────────────
  const alerts = [];
  if (c.allowedToOperate !== 'Y')
    alerts.push({type:'danger', msg:'⚠️ This carrier is NOT authorized to operate.'});
  if (c.commonAuthorityStatus === 'I')
    alerts.push({type:'danger', msg:'⚠️ Common authority is Inactive.'});
  const pendingCancel = insurance.filter(i => i.ins_cancellation_date && new Date(i.ins_cancellation_date) > new Date());
  if (pendingCancel.length > 0)
    alerts.push({type:'danger', msg:`⚠️ Pending insurance cancellation on ${dateStr(pendingCancel[0].ins_cancellation_date)}!`});
  const pendingRevoke = authority.filter(a => a.applicationStatus === 'P');
  if (pendingRevoke.length > 0)
    alerts.push({type:'warning', msg:'⚠️ This carrier has a pending authority revocation.'});

  document.getElementById("alertBanners").innerHTML = alerts.map(a =>
    `<div class="alert-banner alert-${a.type}">${a.msg}</div>`).join('');

  // ── Build sections ─────────────────────────────────────────
  const docketStr = dockets.map(d=>`${d.prefix||''}${d.docketNumber}`).join(', ') || '—';
  const docketTags = dockets.length > 0
    ? dockets.map(d=>`<span class="tag">${d.prefix||''}${d.docketNumber}</span>`).join('')
    : '<span style="color:var(--muted);font-size:13px;">No docket numbers on file</span>';

  const cargoTags = cargo.length > 0
    ? cargo.map(g=>`<span class="tag">${g.cargoClassDesc}</span>`).join('')
    : '<span style="color:var(--muted);font-size:13px;">No cargo data</span>';

  const opsTags = ops.length > 0
    ? ops.map(o=>`<span class="tag">${o.operationClassDesc}</span>`).join('')
    : '<span style="color:var(--muted);font-size:13px;">No data</span>';

  const authRows = authority.length > 0
    ? authority.map(a=>`<tr>
        <td>${fmt(a.operatingAuthorityType)}</td>
        <td><span class="badge ${badgeClass(a.authorityStatus)}">${authLabel(a.authorityStatus)}</span></td>
        <td>${dateStr(a.grantedDate)}</td>
        <td>${a.applicationStatus==='P'?'<span class="badge badge-orange">Pending Revocation</span>':fmt(a.applicationStatus)}</td>
      </tr>`).join('')
    : '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:16px;">No authority records</td></tr>';

  const basicCards = basics.length > 0
    ? basics.map(b => {
        const isAlert = b.alertIndicator === 'Y';
        const p = b.percentile;
        return `<div class="stat-box" style="${isAlert?'border-color:var(--red);':''};min-width:160px;flex:1;">
          <div class="stat-label">${fmt(b.basic)}</div>
          <div class="stat-val sm ${isAlert?'red':p>75?'orange':p!=null?'green':''}">${p!=null?p+'th pct':'N/A'}</div>
          <div class="stat-sub">${isAlert?'⚠️ ALERT':'Measure: '+fmt(b.measure,'N/A')}</div>
        </div>`;}).join('')
    : '<p style="color:var(--muted);font-size:13px;">No BASIC scores available (carrier may not have enough inspections)</p>';

  const driverAvg  = parseFloat(c.driverOosRateNationalAverage)  || 5.51;
  const vehicleAvg = parseFloat(c.vehicleOosRateNationalAverage) || 20.72;
  const hazmatAvg  = parseFloat(c.hazmatOosRateNationalAverage)  || 4.5;

  // Calculate common active duration
  const commonAuthority = authority.find(a => a.operatingAuthorityType === 'Common' && a.authorityStatus === 'A');
  const commonActiveDuration = commonAuthority ? calculateDuration(commonAuthority.grantedDate) : '—';

  function oosBox(label, rate, avg, insp) {
    const color = oosColor(rate, avg);
    const barW = rate != null ? Math.min((rate/Math.max(avg*2,1))*100, 100) : 0;
    return `<div class="stat-box">
      <div class="stat-label">${label}</div>
      <div class="stat-val ${color==='danger'?'red':color==='warn'?'orange':'green'}">${pct(rate)}</div>
      <div class="oos-bar-wrap"><div class="oos-bar ${color}" style="width:${barW}%"></div></div>
      <div class="stat-sub">Natl avg: ${avg}% · ${insp??0} inspections</div>
    </div>`;
  }

  // ── Full render ────────────────────────────────────────────
  document.getElementById("snapshotContent").innerHTML = `
    <div class="snap-header">
      <div>
        <div class="snap-name">${fmt(c.legalName)}${c.dbaName?` <span style="font-weight:400;font-size:15px;color:var(--muted);">dba ${c.dbaName}</span>`:''}
        </div>
        <div class="snap-meta">DOT# ${c.dotNumber} &nbsp;·&nbsp; MC/FF: ${docketStr} &nbsp;·&nbsp; ${fmt(c.carrierOperation?.carrierOperationDesc)}</div>
        <div style="margin-top:10px;">
          ${c.allowedToOperate==='Y'
            ?'<span class="badge badge-green">✓ Authorized to Operate</span>'
            :'<span class="badge badge-red">✗ Not Authorized to Operate</span>'}
          &nbsp;
          <span class="badge ${c.mcs150Outdated==='Y'?'badge-red':'badge-gray'}">MCS-150 ${c.mcs150Outdated==='Y'?'Outdated':'Current'}</span>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:12px;color:var(--muted);">Entity Type</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">${fmt(c.censusTypeId?.censusTypeDesc)}</div>
        <div style="font-size:12px;color:var(--muted);">Safety Rating</div>
        <div style="font-size:14px;font-weight:600;">${fmt(c.safetyRating,'Not Rated')}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Contact Information</div>
      <div class="grid-3">
        <div class="stat-box">
          <div class="stat-label">MC Owner Name</div>
          <div class="stat-val sm">${fmt(ownerInfo?.ownerName || c.legalName,'—')}</div>
          <div class="stat-sub">Company principal officer</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Phone Number</div>
          <div class="stat-val sm">${fmt(ownerInfo?.phone || c.telephone,'—')}</div>
          <div class="stat-sub">Primary contact phone</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Email Address</div>
          <div class="stat-val sm" style="font-size:12px;word-break:break-all;">${fmt(ownerInfo?.email,'—')}</div>
          <div class="stat-sub">Contact email address</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Business Information</div>
      <div class="grid-2" style="margin-bottom:14px;">
        <div class="stat-box">
          <div class="stat-label">Company Status</div>
          <div class="stat-val sm ${corpInfo?.status && corpInfo.status.toLowerCase().includes('active') ? 'green' : 'red'}">${fmt(corpInfo?.status,'Unknown')}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Registered Address</div>
          <div class="stat-val sm" style="font-size:12px;line-height:1.4;">${fmt(corpInfo?.address,'—')}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Key Metrics</div>
      <div class="grid-4">
        <div class="stat-box">
          <div class="stat-label">Common Active</div>
          <div class="stat-val sm green">${commonActiveDuration}</div>
          <div class="stat-sub">Time in common authority</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Power Units (Trucks)</div>
          <div class="stat-val">${fmt(ownerInfo?.powerUnits || c.totalPowerUnits,'—')}</div>
          <div class="stat-sub">Total tractors/trucks</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Own Trailers</div>
          <div class="stat-val">${fmt(ownerInfo?.ownTrailers,'—')}</div>
          <div class="stat-sub">Owned trailers</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total Drivers</div>
          <div class="stat-val">${fmt(ownerInfo?.totalDrivers || c.totalDrivers,'—')}</div>
          <div class="stat-sub">Active drivers on file</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Inspection Data</div>
      <div class="grid-3">
        <div class="stat-box">
          <div class="stat-label">Driver Inspections</div>
          <div class="stat-val">${fmt(c.driverInsp, 0)}</div>
          <div class="stat-sub">Roadside driver checks</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Vehicle Inspections</div>
          <div class="stat-val">${fmt(c.vehicleInsp, 0)}</div>
          <div class="stat-sub">Roadside vehicle checks</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Hazmat Inspections</div>
          <div class="stat-val">${fmt(c.hazmatInsp, 0)}</div>
          <div class="stat-sub">Hazmat material checks</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Safety Metrics</div>
      <div class="grid-4">
        <div class="stat-box"><div class="stat-label">Total Crashes</div><div class="stat-val ${c.crashTotal>0?'red':'green'}">${fmt(c.crashTotal,0)}</div></div>
        <div class="stat-box"><div class="stat-label">Fatal Crashes</div><div class="stat-val ${c.fatalCrash>0?'red':'green'}">${fmt(c.fatalCrash,0)}</div></div>
        <div class="stat-box"><div class="stat-label">Injury Crashes</div><div class="stat-val ${c.injCrash>0?'orange':'green'}">${fmt(c.injCrash,0)}</div></div>
        <div class="stat-box"><div class="stat-label">Tow-away Crashes</div><div class="stat-val ${c.towawayCrash>0?'orange':'green'}">${fmt(c.towawayCrash,0)}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Authority Status</div>
      <div class="grid-3" style="margin-bottom:14px;">
        <div class="stat-box">
          <div class="stat-label">Common Authority</div>
          <div class="stat-val sm ${c.commonAuthorityStatus==='A'?'green':'red'}">${authLabel(c.commonAuthorityStatus)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Contract Authority</div>
          <div class="stat-val sm ${c.contractAuthorityStatus==='A'?'green':''}">${authLabel(c.contractAuthorityStatus)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Broker Authority</div>
          <div class="stat-val sm ${c.brokerAuthorityStatus==='A'?'green':''}">${authLabel(c.brokerAuthorityStatus)}</div>
        </div>
      </div>
      <table class="data-table">
        <thead><tr><th>Authority Type</th><th>Status</th><th>Granted Date</th><th>Application Status</th></tr></thead>
        <tbody>${authRows}</tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">MC / Docket Numbers</div>
      <div class="tag-list">${docketTags}</div>
    </div>

    <div class="section">
      <div class="section-title">Insurance Summary</div>
      <div class="grid-3" style="margin-bottom:14px;">
        <div class="stat-box">
          <div class="stat-label">BIPD Required</div>
          <div class="stat-val sm">${c.bipdInsuranceRequired==='Y'?'Yes':'No'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BIPD On File</div>
          <div class="stat-val sm ${parseInt(c.bipdInsuranceOnFile||0)>0?'green':'red'}">${c.bipdInsuranceOnFile?formatMoney(c.bipdInsuranceOnFile,'k'):'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Insurance Match</div>
          <div class="stat-val sm ${c.bipdInsuranceRequired==='Y' && parseInt(c.bipdInsuranceOnFile||0) >= parseInt(c.bipdRequiredAmount||0) ? 'green' : 'red'}">${c.bipdInsuranceRequired==='Y' ? (parseInt(c.bipdInsuranceOnFile||0) >= parseInt(c.bipdRequiredAmount||0) ? 'OK' : 'Below Limit') : 'N/A'}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Out-of-Service Rates</div>
      <div class="grid-3">
        ${oosBox('Driver OOS Rate', c.driverOosRate, driverAvg, c.driverInsp)}
        ${oosBox('Vehicle OOS Rate', c.vehicleOosRate, vehicleAvg, c.vehicleInsp)}
        ${oosBox('Hazmat OOS Rate', c.hazmatOosRate, hazmatAvg, c.hazmatInsp)}
      </div>
    </div>

    <div class="section">
      <div class="section-title">CSA BASIC Scores</div>
      <div style="display:flex;flex-wrap:wrap;gap:12px;">${basicCards}</div>
    </div>

    <div class="section">
      <div class="section-title">Operation Classification</div>
      <div class="tag-list" style="margin-bottom:16px;">${opsTags}</div>
      <div class="section-title">Cargo Transported</div>
      <div class="tag-list">${cargoTags}</div>
    </div>

    <div class="section">
      <div class="section-title">Physical Address</div>
      <div class="stat-box" style="display:inline-block;">
        <div style="font-size:14px;">${[c.phyStreet,c.phyCity,c.phyState,c.phyZipcode].filter(Boolean).join(', ')}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${fmt(c.phyCountry)}</div>
      </div>
    </div>
  `;

  document.getElementById("snapshotLoading").style.display = "none";
  document.getElementById("snapshotContent").style.display = "block";
}
</script>
</body>
</html>
