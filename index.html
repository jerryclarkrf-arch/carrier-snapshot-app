<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freight Services | Carrier Snapshot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  :root {
    --navy: #1a4a7c;
    --navy-dark: #0f2d4e;
    --gold: #f8c750;
    --gold-dark: #e0a800;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1a2332;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #16a34a;
    --red: #dc2626;
    --shadow: 0 4px 24px rgba(26,74,124,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: var(--navy);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 26px; height: 26px; fill: var(--gold); }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Search card */
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 0;
  }

  input[type="text"] {
    flex: 1;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    font-size: 15px;
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
  }
  input[type="text"]:focus { border-color: var(--navy); }

  .btn-search {
    padding: 13px 28px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-search:hover { background: var(--navy-dark); }

  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
    margin-top: 16px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results table */
  .results-card { display: none; }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: #f8fafc;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }
  td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-active { background: #dcfce7; color: var(--green); }
  .status-inactive { background: #fee2e2; color: var(--red); }

  .btn-select {
    background: var(--gold);
    color: var(--navy-dark);
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-select:hover { background: var(--gold-dark); }

  /* Snapshot detail */
  #snapshotDetails { display: none; }

  .back-btn {
    background: none;
    border: none;
    color: var(--navy);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    padding: 0;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .back-btn:hover { color: var(--navy-dark); }

  .snapshot-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }
  .snapshot-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
  }
  .snapshot-dot {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.small { font-size: 14px; font-weight: 600; }

  /* OOS section */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
    margin-top: 20px;
  }

  .oos-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .oos-box {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .oos-box .stat-label { margin-bottom: 8px; }
  .oos-rate {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
  }
  .oos-rate.warn { color: #d97706; }
  .oos-rate.danger { color: var(--red); }
  .oos-avg {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Address */
  .address-box {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* Insurance */
  .ins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .ins-box {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .error-state .err-icon { font-size: 32px; margin-bottom: 12px; }
  .error-state h3 { color: var(--red); margin-bottom: 8px; }

  @media (max-width: 600px) {
    .oos-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-.5 1.5 1.96 2.5H17V9.5h2.5zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2.22-3c-.55-.61-1.33-1-2.22-1s-1.67.39-2.22 1H3V6h12v9H8.22zm9.78 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
    </div>
    <div>
      <h1>Carrier Snapshot Search</h1>
      <p>Search by DOT#, MC#, or Company Name</p>
    </div>
  </div>

  <!-- Search Card -->
  <div class="card">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="e.g. 1677170 or MID VALLEY TRANSPORT" onkeydown="if(event.key==='Enter') searchCarriers()">
      <button class="btn-search" onclick="searchCarriers()">Search</button>
    </div>
    <div class="loading" id="loadingMsg">
      <div class="spinner"></div>
      <span>Searching FMCSA databases...</span>
    </div>
  </div>

  <!-- Results -->
  <div class="card results-card" id="resultsCard">
    <table id="resultsTable">
      <thead>
        <tr>
          <th>Legal Name</th>
          <th>DOT Number</th>
          <th>MC/Docket</th>
          <th>Status</th>
          <th>Location</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Snapshot Detail -->
  <div id="snapshotDetails">
    <button class="back-btn" onclick="goBack()">
      ← Back to Results
    </button>
    <div class="card" id="snapshotCard">
      <div id="snapshotLoading" style="text-align:center;padding:40px;color:var(--muted);">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        <p>Fetching live FMCSA data...</p>
      </div>
      <div id="snapshotContent" style="display:none;"></div>
    </div>
  </div>

</div>

<script>
  const URL_SEARCH = "https://n8n.turbofreightllc.com/webhook/carrier-search";
  const FMCSA_KEY = "765f2002350d7989b1fef32b3522639c55fc27a8";

  async function searchCarriers() {
    const query = document.getElementById("searchInput").value.trim();
    if (!query) return alert("Please enter a search term.");

    document.getElementById("resultsCard").style.display = "none";
    document.getElementById("snapshotDetails").style.display = "none";
    document.getElementById("loadingMsg").style.display = "flex";
    document.getElementById("tableBody").innerHTML = "";

    try {
      const response = await fetch(`${URL_SEARCH}?q=${encodeURIComponent(query)}`);
      if (!response.ok) throw new Error("Search failed");
      const data = await response.json();

      document.getElementById("loadingMsg").style.display = "none";

      if (!data || data.length === 0) return alert("No carriers found. Try a different search.");

      const tbody = document.getElementById("tableBody");
      data.forEach(c => {
        const isActive = c.status_code === 'A';
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><strong>${c.legal_name || 'N/A'}</strong></td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${c.dot_number || 'N/A'}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${c.docket1 || 'N/A'}</td>
          <td><span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? 'Active' : 'Inactive'}</span></td>
          <td>${[c.phy_city, c.phy_state].filter(Boolean).join(', ') || 'N/A'}</td>
          <td><button class="btn-select" onclick="getDeepSnapshot('${c.dot_number}', '${(c.legal_name||'').replace(/'/g,"\\'")}')">Select</button></td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("resultsCard").style.display = "block";

    } catch (err) {
      document.getElementById("loadingMsg").style.display = "none";
      alert("Error searching. Check your n8n search webhook.");
    }
  }

  function goBack() {
    document.getElementById("snapshotDetails").style.display = "none";
    document.getElementById("resultsCard").style.display = "block";
  }

  async function getDeepSnapshot(dotNumber, legalName) {
    document.getElementById("resultsCard").style.display = "none";
    document.getElementById("snapshotDetails").style.display = "block";
    document.getElementById("snapshotLoading").style.display = "block";
    document.getElementById("snapshotContent").style.display = "none";

    try {
      // Call FMCSA directly from browser — bypasses n8n IP block
      const response = await fetch(
        `https://mobile.fmcsa.dot.gov/qc/services/carriers/${dotNumber}?webKey=${FMCSA_KEY}`
      );
      if (!response.ok) throw new Error("FMCSA error");
      const data = await response.json();
      const c = data.content.carrier;

      const authStatus = c.commonAuthorityStatus === 'A' ? 'Active' :
                         c.commonAuthorityStatus === 'I' ? 'Inactive' :
                         c.commonAuthorityStatus === 'N' ? 'None' : c.commonAuthorityStatus;

      const allowed = c.allowedToOperate === 'Y';

      function oosClass(rate, avg) {
        if (rate > avg * 1.5) return 'danger';
        if (rate > avg) return 'warn';
        return '';
      }

      const html = `
        <div class="snapshot-header">
          <div>
            <div class="snapshot-name">${c.legalName}${c.dbaName ? ` <span style="font-weight:400;font-size:15px;color:var(--muted);">dba ${c.dbaName}</span>` : ''}</div>
            <div class="snapshot-dot">DOT# ${c.dotNumber} &nbsp;·&nbsp; ${c.carrierOperation?.carrierOperationDesc || ''}</div>
          </div>
          <span class="status-badge ${allowed ? 'status-active' : 'status-inactive'}" style="font-size:13px;padding:5px 14px;">
            ${allowed ? '✓ Authorized to Operate' : '✗ Not Authorized'}
          </span>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Authority Status</div>
            <div class="stat-value small ${authStatus === 'Active' ? 'green' : 'red'}">${authStatus}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Power Units</div>
            <div class="stat-value">${c.totalPowerUnits ?? 'N/A'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total Drivers</div>
            <div class="stat-value">${c.totalDrivers ?? 'N/A'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Safety Rating</div>
            <div class="stat-value small">${c.safetyRating || 'Not Rated'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total Crashes</div>
            <div class="stat-value ${c.crashTotal > 0 ? 'red' : ''}">${c.crashTotal ?? 0}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Fatal Crashes</div>
            <div class="stat-value ${c.fatalCrash > 0 ? 'red' : ''}">${c.fatalCrash ?? 0}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Injury Crashes</div>
            <div class="stat-value ${c.injCrash > 0 ? 'red' : ''}">${c.injCrash ?? 0}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">MCS-150 Outdated</div>
            <div class="stat-value small ${c.mcs150Outdated === 'Y' ? 'red' : 'green'}">${c.mcs150Outdated === 'Y' ? 'Yes' : 'No'}</div>
          </div>
        </div>

        <div class="section-title">Out-of-Service Rates</div>
        <div class="oos-row">
          <div class="oos-box">
            <div class="stat-label">Driver OOS Rate</div>
            <div class="oos-rate ${oosClass(c.driverOosRate, parseFloat(c.driverOosRateNationalAverage))}">${c.driverOosRate != null ? c.driverOosRate.toFixed(1) + '%' : 'N/A'}</div>
            <div class="oos-avg">National avg: ${c.driverOosRateNationalAverage}% &nbsp;|&nbsp; ${c.driverInsp ?? 0} inspections</div>
          </div>
          <div class="oos-box">
            <div class="stat-label">Vehicle OOS Rate</div>
            <div class="oos-rate ${oosClass(c.vehicleOosRate, parseFloat(c.vehicleOosRateNationalAverage))}">${c.vehicleOosRate != null ? c.vehicleOosRate.toFixed(1) + '%' : 'N/A'}</div>
            <div class="oos-avg">National avg: ${c.vehicleOosRateNationalAverage}% &nbsp;|&nbsp; ${c.vehicleInsp ?? 0} inspections</div>
          </div>
          <div class="oos-box">
            <div class="stat-label">Hazmat OOS Rate</div>
            <div class="oos-rate ${oosClass(c.hazmatOosRate, parseFloat(c.hazmatOosRateNationalAverage))}">${c.hazmatOosRate != null ? c.hazmatOosRate.toFixed(1) + '%' : 'N/A'}</div>
            <div class="oos-avg">National avg: ${c.hazmatOosRateNationalAverage}% &nbsp;|&nbsp; ${c.hazmatInsp ?? 0} inspections</div>
          </div>
        </div>

        <div class="section-title">Insurance</div>
        <div class="ins-grid">
          <div class="ins-box">
            <div class="stat-label">BIPD Required</div>
            <div class="stat-value small">${c.bipdInsuranceRequired === 'Y' ? 'Yes' : 'No'}</div>
          </div>
          <div class="ins-box">
            <div class="stat-label">BIPD On File</div>
            <div class="stat-value small ${c.bipdInsuranceOnFile > 0 ? 'green' : 'red'}">$${parseInt(c.bipdInsuranceOnFile || 0).toLocaleString()}k</div>
          </div>
          <div class="ins-box">
            <div class="stat-label">Cargo Insurance</div>
            <div class="stat-value small">${c.cargoInsuranceRequired === 'Y' ? 'Required' : c.cargoInsuranceRequired === 'N' ? 'Not Required' : 'Unknown'}</div>
          </div>
          <div class="ins-box">
            <div class="stat-label">Bond On File</div>
            <div class="stat-value small">${parseInt(c.bondInsuranceOnFile || 0).toLocaleString()}</div>
          </div>
        </div>

        <div class="section-title">Physical Address</div>
        <div class="address-box">
          ${[c.phyStreet, c.phyCity, c.phyState, c.phyZipcode, c.phyCountry].filter(Boolean).join(', ')}
        </div>
      `;

      document.getElementById("snapshotLoading").style.display = "none";
      document.getElementById("snapshotContent").innerHTML = html;
      document.getElementById("snapshotContent").style.display = "block";

    } catch (err) {
      document.getElementById("snapshotLoading").style.display = "none";
      document.getElementById("snapshotContent").innerHTML = `
        <div class="error-state">
          <div class="err-icon">⚠️</div>
          <h3>Could not load snapshot</h3>
          <p>FMCSA returned an error for DOT# ${dotNumber}. Try again in a moment.</p>
        </div>
      `;
      document.getElementById("snapshotContent").style.display = "block";
    }
  }
</script>
</body>
</html>
